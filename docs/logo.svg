<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="komado">
  <title>komado</title>
  <style>
    svg {
      --ink: #1f2328;
      --accent: #2f9e6e;
      color: var(--ink);
    }
    @media (prefers-color-scheme: dark) {
      svg { --ink: #e6edf3; }
    }
    .frame { stroke: currentColor; }
    .dot { fill: currentColor; }
    .accent { fill: var(--accent); }
  </style>
  <rect x="10" y="14" width="108" height="100" rx="10" fill="none" class="frame" stroke-width="6"/>
  <line x1="10" y1="38" x2="118" y2="38" class="frame" stroke-width="6"/>
  <circle cx="26" cy="26" r="4" class="dot"/>
  <circle cx="40" cy="26" r="4" class="dot"/>
  <g class="frame" stroke-width="4" fill="none">
    <rect x="30" y="54" width="68" height="44" rx="3"/>
    <line x1="64" y1="54" x2="64" y2="98"/>
    <line x1="30" y1="76" x2="98" y2="76"/>
  </g>
  <rect x="68" y="58" width="26" height="14" rx="2" class="accent"/>
</svg>
